<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WAVE LAB v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F5E4C4;--bg2:#FFF8EE;--text:#2C1A0E;--text2:#7A5C3E;
--teal:#3AABA8;--orange:#E88A0A;--blue:#2E8EC4;--border:rgba(44,26,14,.12);
}
body{font-family:'Noto Sans JP',Meiryo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--teal);text-decoration:none}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{background:var(--teal);color:#fff;font-weight:900;font-size:18px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;letter-spacing:-1px}
.header-title{flex:1}
.header-title h1{font-size:18px;font-weight:900;letter-spacing:2px;line-height:1.2}
.header-title .sub{font-size:10px;color:var(--text2);letter-spacing:1px}
.ble-area{display:flex;align-items:center;gap:8px}
.ble-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.ble-btn:hover{opacity:.85}
.ble-btn.connected{background:var(--text2)}
.ble-dot{width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0}
.ble-dot.on{background:#4caf50;box-shadow:0 0 6px #4caf50}

/* Main */
.main{flex:1;max-width:800px;width:100%;margin:0 auto;padding:16px}
.view{display:none}
.view.active{display:block}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:14px;font-weight:700}

/* Form */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:4px;color:var(--text2)}
.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--text)}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--teal)}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-teal{background:var(--teal);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-danger{background:#C94040;color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}

/* Takes list */
.takes-list{margin-top:16px}
.take-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.take-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.take-info{flex:1;font-size:13px}
.take-info .tname{font-weight:700}
.take-info .tloc{color:var(--text2);font-size:12px}
.take-count{font-size:12px;color:var(--text2)}

/* Measurement */
.back-link{font-size:13px;margin-bottom:12px;display:inline-block;cursor:pointer}
.take-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.take-bar .dot{width:14px;height:14px;border-radius:50%}
.take-bar .info{font-size:14px;font-weight:700}
.take-bar .loc{font-size:12px;color:var(--text2);margin-left:8px;font-weight:400}

.axis-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.axis-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.axis-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}

.chart-wrap{background:#fff;border-radius:10px;border:1px solid var(--border);padding:10px;margin-bottom:14px}
.chart-wrap canvas{width:100%!important;height:200px!important}

.live-vals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.lv{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.lv .label{font-size:10px;color:var(--text2);font-weight:700}
.lv .val{font-size:18px;font-weight:900;font-variant-numeric:tabular-nums}

.rec-btns{display:flex;gap:10px;margin-bottom:14px}
.rec-btns .btn{flex:1}

.timer-display{text-align:center;font-size:14px;color:var(--text2);margin-bottom:10px;font-variant-numeric:tabular-nums}

/* Compare */
.mode-toggle{display:flex;gap:6px;margin-bottom:14px}
.mode-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);font-size:13px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
.mode-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
.legend-dot{width:10px;height:10px;border-radius:50%}

.compare-chart-wrap{margin-bottom:14px}
.compare-chart-wrap .chart-label{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.compare-chart-wrap canvas{width:100%!important;height:200px!important}

.stats-section{margin-top:14px}
.stats-toggle{font-size:13px;font-weight:700;cursor:pointer;padding:10px 0;display:flex;align-items:center;gap:6px;color:var(--text2)}
.stats-toggle::before{content:'';display:inline-block;width:0;height:0;border-left:6px solid var(--text2);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .2s}
.stats-toggle.open::before{transform:rotate(90deg)}
.stats-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.stats-table th,.stats-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
.stats-table th{background:var(--bg);font-weight:700;font-size:11px;color:var(--text2)}
.stats-table td{font-variant-numeric:tabular-nums}

/* Footer */
.footer{text-align:center;padding:16px;font-size:11px;color:var(--text2)}

@media(max-width:768px){
  .main{padding:10px}
  .live-vals{grid-template-columns:repeat(4,1fr);gap:4px}
  .lv .val{font-size:14px}
  .lv .label{font-size:9px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">WL</div>
  <div class="header-title">
    <h1>WAVE LAB</h1>
    <div class="sub">SENSOR COMPARE LAB v1.0</div>
  </div>
  <div class="ble-area">
    <button class="ble-btn" id="bleBtn" onclick="toggleBLE()">BLE接続</button>
    <div class="ble-dot" id="bleDot"></div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Screen 1: Setup -->
  <div class="view active" id="v-setup">
    <div class="card">
      <h2>セッション設定</h2>
      <div class="form-group">
        <label>テイク名 *</label>
        <input type="text" id="inName" placeholder="例: 田中 / 1回目" oninput="checkSetupReady()">
      </div>
      <div class="form-group">
        <label>取り付け場所</label>
        <input type="text" id="inLoc" placeholder="例: 竹刀の根元 / 手首">
      </div>
      <div class="form-group">
        <label>メモ（任意）</label>
        <input type="text" id="inMemo" placeholder="自由記入">
      </div>
      <button class="btn btn-teal" id="btnStartMeas" disabled onclick="startMeas()">測定開始 &rarr;</button>
    </div>
    <div id="takesList" class="takes-list"></div>
    <button class="btn btn-orange" id="btnCompare" style="display:none;margin-top:12px" onclick="goTo('v-compare');renderCompare()">比較する &rarr;</button>
  </div>

  <!-- Screen 2: Measurement -->
  <div class="view" id="v-meas">
    <a class="back-link" onclick="goTo('v-setup')">&larr; セッション設定</a>
    <div class="take-bar" id="measBar"><div class="dot"></div><span class="info"></span><span class="loc"></span></div>

    <div class="axis-btns" id="liveAxisBtns">
      <button class="axis-btn active" data-ax="abs">ABS</button>
      <button class="axis-btn" data-ax="ax">AX</button>
      <button class="axis-btn" data-ax="ay">AY</button>
      <button class="axis-btn" data-ax="az">AZ</button>
      <button class="axis-btn" data-ax="gyro">GYRO</button>
    </div>

    <div class="chart-wrap"><canvas id="liveChart"></canvas></div>

    <div class="live-vals">
      <div class="lv"><div class="label">ABS(G)</div><div class="val" id="lvAbs">-</div></div>
      <div class="lv"><div class="label">Ax</div><div class="val" id="lvAx">-</div></div>
      <div class="lv"><div class="label">Ay</div><div class="val" id="lvAy">-</div></div>
      <div class="lv"><div class="label">Az</div><div class="val" id="lvAz">-</div></div>
      <div class="lv"><div class="label">Gx</div><div class="val" id="lvGx">-</div></div>
      <div class="lv"><div class="label">Gy</div><div class="val" id="lvGy">-</div></div>
      <div class="lv"><div class="label">Gz</div><div class="val" id="lvGz">-</div></div>
      <div class="lv"><div class="label">GYRO</div><div class="val" id="lvGyro">-</div></div>
    </div>

    <div class="timer-display" id="timerDisp">00:00.0</div>

    <div class="rec-btns">
      <button class="btn btn-teal" id="btnRec" onclick="startRec()">&#9679; 記録開始</button>
      <button class="btn btn-danger" id="btnStop" onclick="stopRec()" disabled>&#9632; 停止</button>
    </div>

    <button class="btn btn-orange" id="btnSave" style="display:none" onclick="saveTake()">このデータを保存して次へ &rarr;</button>
  </div>

  <!-- Screen 3: Compare -->
  <div class="view" id="v-compare">
    <a class="back-link" onclick="goTo('v-setup')">&larr; セッション設定</a>

    <div class="mode-toggle">
      <button class="mode-btn active" id="modeOverlay" onclick="setCompMode('overlay')">重ね合わせ</button>
      <button class="mode-btn" id="modeStack" onclick="setCompMode('stack')">縦並び</button>
    </div>

    <div class="axis-btns" id="compAxisBtns">
      <button class="axis-btn active" data-ax="abs">ABS</button>
      <button class="axis-btn" data-ax="ax">AX</button>
      <button class="axis-btn" data-ax="ay">AY</button>
      <button class="axis-btn" data-ax="az">AZ</button>
    </div>

    <div class="legend" id="compLegend"></div>
    <div id="compCharts"></div>

    <div class="stats-section">
      <div class="stats-toggle" id="statsToggle" onclick="toggleStats()">統計情報</div>
      <div id="statsBody" style="display:none"></div>
    </div>

    <button class="btn btn-outline" style="margin-top:20px" onclick="resetAll()">最初からやり直す</button>
  </div>
</div>

<!-- Footer -->
<div class="footer">&copy; SchooMy, Inc. &mdash; WAVE LAB v1.0</div>

<script>
/* ===== Constants ===== */
const SVC_UUID = '6e400001-b5b3-f393-e0a9-e50e24dcca9e';
const TX_UUID  = '6e400003-b5b3-f393-e0a9-e50e24dcca9e';
const RX_UUID  = '6e400002-b5b3-f393-e0a9-e50e24dcca9e';
const TAKE_COLORS = ['#3AABA8','#E88A0A','#2E8EC4','#C94040','#7B5EA7'];
const MAX_LIVE = 200;
const MAX_COMP_PTS = 1000;

/* ===== State ===== */
let bleDevice = null, bleChar = null, bleConnected = false;
let takes = [];
let currentTake = null;
let liveBuffer = [];
let fullLog = [];
let recording = false;
let liveAxis = 'abs';
let compMode = 'overlay';
let compAxis = 'abs';
let recStart = 0, timerInterval = null;
let partialLine = '';

/* ===== BLE ===== */
async function toggleBLE(){
  if(bleConnected){ disconnectBLE(); return; }
  try{
    bleDevice = await navigator.bluetooth.requestDevice({
      filters:[{name:'SchooMy_001'}],
      optionalServices:[SVC_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnect);
    const server = await bleDevice.gatt.connect();
    const svc = await server.getPrimaryService(SVC_UUID);
    const tx = await svc.getCharacteristic(TX_UUID);
    await tx.startNotifications();
    tx.addEventListener('characteristicvaluechanged', onBLEData);
    bleChar = await svc.getCharacteristic(RX_UUID);
    setBLEState(true);
  }catch(e){console.error('BLE error',e)}
}
function disconnectBLE(){
  if(bleDevice&&bleDevice.gatt.connected) bleDevice.gatt.disconnect();
  setBLEState(false);
}
function onDisconnect(){setBLEState(false)}
function setBLEState(on){
  bleConnected=on;
  document.getElementById('bleDot').classList.toggle('on',on);
  document.getElementById('bleBtn').textContent=on?'切断':'BLE接続';
  document.getElementById('bleBtn').classList.toggle('connected',on);
  checkSetupReady();
}

function onBLEData(e){
  const dec = new TextDecoder();
  const chunk = dec.decode(e.target.value);
  partialLine += chunk;
  const lines = partialLine.split('\n');
  partialLine = lines.pop();
  for(const line of lines){
    if(!line.trim()) continue;
    const parts = line.trim().split(',');
    if(parts.length < 7) continue;
    const ax = parseFloat(parts[0])||0;
    const ay = parseFloat(parts[1])||0;
    const az = parseFloat(parts[2])||0;
    const gx = parseFloat(parts[3])||0;
    const gy = parseFloat(parts[4])||0;
    const gz = parseFloat(parts[5])||0;
    let abs = parts.length>=8 ? parseFloat(parts[7]) : 0;
    if(!abs||isNaN(abs)) abs = Math.sqrt(ax*ax+ay*ay+az*az);
    const t = Date.now();
    const sample = {t,ax,ay,az,gx,gy,gz,abs};
    liveBuffer.push(sample);
    if(liveBuffer.length>MAX_LIVE) liveBuffer.shift();
    if(recording) fullLog.push(sample);
    updateLiveVals(sample);
  }
}

/* ===== View switching ===== */
function goTo(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='v-setup') renderTakesList();
}

/* ===== Setup ===== */
function checkSetupReady(){
  const name = document.getElementById('inName').value.trim();
  document.getElementById('btnStartMeas').disabled = !(bleConnected && name && takes.length<5);
}
function startMeas(){
  const name = document.getElementById('inName').value.trim();
  const loc = document.getElementById('inLoc').value.trim();
  const memo = document.getElementById('inMemo').value.trim();
  const color = TAKE_COLORS[takes.length];
  currentTake = {name,location:loc,memo,color};
  liveBuffer=[];
  fullLog=[];
  recording=false;
  document.getElementById('btnSave').style.display='none';
  document.getElementById('btnRec').disabled=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('timerDisp').textContent='00:00.0';

  const bar=document.getElementById('measBar');
  bar.querySelector('.dot').style.background=color;
  bar.querySelector('.info').textContent=name;
  bar.querySelector('.loc').textContent=loc?('/ '+loc):'';

  initLiveChart(color);
  goTo('v-meas');
  startLiveLoop();
}

/* ===== Live chart ===== */
let liveChart=null, liveLoopId=null;
function initLiveChart(color){
  if(liveChart){liveChart.destroy();liveChart=null}
  const ctx=document.getElementById('liveChart').getContext('2d');
  liveChart=new Chart(ctx,{
    type:'line',
    data:{labels:[], datasets:[{data:[],borderColor:color,borderWidth:1.5,pointRadius:0,tension:.2}]},
    options:{
      animation:false,responsive:true,maintainAspectRatio:false,
      scales:{x:{display:false},y:{beginAtZero:false,ticks:{font:{size:10}}}},
      plugins:{legend:{display:false}}
    }
  });
}
function startLiveLoop(){
  if(liveLoopId) cancelAnimationFrame(liveLoopId);
  function loop(){
    if(!document.getElementById('v-meas').classList.contains('active')){liveLoopId=null;return}
    updateLiveChart();
    liveLoopId=requestAnimationFrame(loop);
  }
  liveLoopId=requestAnimationFrame(loop);
}
function getAxisVal(s,axis){
  if(axis==='abs')return s.abs;
  if(axis==='ax')return s.ax;
  if(axis==='ay')return s.ay;
  if(axis==='az')return s.az;
  if(axis==='gyro')return Math.sqrt(s.gx*s.gx+s.gy*s.gy+s.gz*s.gz);
  return s.abs;
}
function updateLiveChart(){
  if(!liveChart)return;
  const data=liveBuffer.map(s=>getAxisVal(s,liveAxis));
  liveChart.data.labels=data.map((_,i)=>i);
  liveChart.data.datasets[0].data=data;
  liveChart.update('none');
}
function updateLiveVals(s){
  document.getElementById('lvAbs').textContent=s.abs.toFixed(2);
  document.getElementById('lvAx').textContent=s.ax.toFixed(2);
  document.getElementById('lvAy').textContent=s.ay.toFixed(2);
  document.getElementById('lvAz').textContent=s.az.toFixed(2);
  document.getElementById('lvGx').textContent=s.gx.toFixed(1);
  document.getElementById('lvGy').textContent=s.gy.toFixed(1);
  document.getElementById('lvGz').textContent=s.gz.toFixed(1);
  const gyro=Math.sqrt(s.gx*s.gx+s.gy*s.gy+s.gz*s.gz);
  document.getElementById('lvGyro').textContent=gyro.toFixed(1);
}

/* Axis selector – live */
document.getElementById('liveAxisBtns').addEventListener('click',e=>{
  if(!e.target.classList.contains('axis-btn'))return;
  document.querySelectorAll('#liveAxisBtns .axis-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  liveAxis=e.target.dataset.ax;
});

/* ===== Recording ===== */
function startRec(){
  fullLog=[];
  recording=true;
  recStart=Date.now();
  document.getElementById('btnRec').disabled=true;
  document.getElementById('btnStop').disabled=false;
  document.getElementById('btnSave').style.display='none';
  timerInterval=setInterval(updateTimer,100);
}
function stopRec(){
  recording=false;
  document.getElementById('btnRec').disabled=false;
  document.getElementById('btnStop').disabled=true;
  clearInterval(timerInterval);
  if(fullLog.length>0) document.getElementById('btnSave').style.display='block';
}
function updateTimer(){
  const el=Date.now()-recStart;
  const s=Math.floor(el/1000);
  const m=Math.floor(s/60);
  const ss=s%60;
  const ms=Math.floor((el%1000)/100);
  document.getElementById('timerDisp').textContent=String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+ms;
}

/* ===== Save take ===== */
function saveTake(){
  const metrics=calcMetrics(fullLog);
  const take={
    id:Date.now(),
    name:currentTake.name,
    location:currentTake.location,
    memo:currentTake.memo,
    color:currentTake.color,
    fullLog:[...fullLog],
    metrics
  };
  takes.push(take);
  document.getElementById('inName').value='';
  document.getElementById('inLoc').value='';
  document.getElementById('inMemo').value='';
  goTo('v-setup');
}

/* ===== Metrics ===== */
function calcMetrics(log){
  if(!log.length)return{maxImpact:0,avgImpact:0,peakCount:0,maxGyro:0,duration:0};
  const absVals=log.map(s=>s.abs);
  const baseline=absVals.reduce((a,b)=>a+b,0)/absVals.length;
  const peaks=[];
  let lastPeakT=0;
  for(let i=1;i<log.length-1;i++){
    const v=log[i].abs;
    if(v>baseline+0.5 && v>log[i-1].abs && v>log[i+1].abs){
      if(log[i].t-lastPeakT>=300){
        peaks.push(v);
        lastPeakT=log[i].t;
      }
    }
  }
  const maxImpact=Math.max(...absVals);
  const avgImpact=peaks.length? peaks.reduce((a,b)=>a+b,0)/peaks.length : absVals.reduce((a,b)=>a+b,0)/absVals.length;
  const peakCount=peaks.length;
  let maxGyro=0;
  for(const s of log){
    const g=Math.sqrt(s.gx*s.gx+s.gy*s.gy+s.gz*s.gz);
    if(g>maxGyro)maxGyro=g;
  }
  const duration=(log[log.length-1].t-log[0].t)/1000;
  return{maxImpact,avgImpact,peakCount,maxGyro,duration};
}

/* ===== Takes list ===== */
function renderTakesList(){
  const el=document.getElementById('takesList');
  if(!takes.length){el.innerHTML='';document.getElementById('btnCompare').style.display='none';checkSetupReady();return}
  let html='<div class="card"><h2>保存済みテイク</h2>';
  for(const t of takes){
    html+=`<div class="take-item">
      <div class="take-dot" style="background:${t.color}"></div>
      <div class="take-info"><span class="tname">${esc(t.name)}</span><br><span class="tloc">${esc(t.location)}</span></div>
      <div class="take-count">${t.fullLog.length} pts</div>
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
  document.getElementById('btnCompare').style.display=takes.length>=2?'block':'none';
  checkSetupReady();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ===== Compare ===== */
let compCharts=[];
function setCompMode(m){
  compMode=m;
  document.getElementById('modeOverlay').classList.toggle('active',m==='overlay');
  document.getElementById('modeStack').classList.toggle('active',m==='stack');
  renderCompare();
}
document.getElementById('compAxisBtns').addEventListener('click',e=>{
  if(!e.target.classList.contains('axis-btn'))return;
  document.querySelectorAll('#compAxisBtns .axis-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  compAxis=e.target.dataset.ax;
  renderCompare();
});

function downsample(arr,max){
  if(arr.length<=max)return arr;
  const step=arr.length/max;
  const out=[];
  for(let i=0;i<max;i++) out.push(arr[Math.floor(i*step)]);
  return out;
}

function renderCompare(){
  compCharts.forEach(c=>c.destroy());
  compCharts=[];
  const container=document.getElementById('compCharts');
  container.innerHTML='';

  // legend
  const leg=document.getElementById('compLegend');
  leg.innerHTML=takes.map(t=>`<div class="legend-item"><div class="legend-dot" style="background:${t.color}"></div>${esc(t.name)}</div>`).join('');

  if(compMode==='overlay'){
    const canvas=document.createElement('canvas');
    canvas.style.cssText='width:100%!important;height:250px!important';
    const wrap=document.createElement('div');
    wrap.className='chart-wrap';
    wrap.appendChild(canvas);
    container.appendChild(wrap);

    const datasets=takes.map(t=>{
      const ds=downsample(t.fullLog,MAX_COMP_PTS);
      const maxLen=ds.length;
      return{
        label:t.name,
        data:ds.map((s,i)=>({x:(i/(maxLen-1||1))*100, y:getAxisVal(s,compAxis)})),
        borderColor:t.color,borderWidth:1.5,pointRadius:0,tension:.2,fill:false
      };
    });
    const ch=new Chart(canvas.getContext('2d'),{
      type:'line',
      data:{datasets},
      options:{
        animation:false,responsive:true,maintainAspectRatio:false,
        scales:{x:{type:'linear',title:{display:true,text:'進捗 %',font:{size:11}},ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}},
        plugins:{legend:{display:false}}
      }
    });
    compCharts.push(ch);
  } else {
    for(const t of takes){
      const wrap=document.createElement('div');
      wrap.className='compare-chart-wrap';
      const label=document.createElement('div');
      label.className='chart-label';
      label.innerHTML=`<div class="legend-dot" style="background:${t.color}"></div> ${esc(t.name)} <span style="color:var(--text2);font-weight:400;font-size:12px">${esc(t.location)}</span>`;
      wrap.appendChild(label);
      const cwrap=document.createElement('div');
      cwrap.className='chart-wrap';
      const canvas=document.createElement('canvas');
      canvas.style.cssText='width:100%!important;height:160px!important';
      cwrap.appendChild(canvas);
      wrap.appendChild(cwrap);
      container.appendChild(wrap);

      const ds=downsample(t.fullLog,MAX_COMP_PTS);
      const ch=new Chart(canvas.getContext('2d'),{
        type:'line',
        data:{
          datasets:[{
            data:ds.map((s,i)=>({x:(i/(ds.length-1||1))*100,y:getAxisVal(s,compAxis)})),
            borderColor:t.color,borderWidth:1.5,pointRadius:0,tension:.2,fill:false
          }]
        },
        options:{
          animation:false,responsive:true,maintainAspectRatio:false,
          scales:{x:{type:'linear',title:{display:true,text:'進捗 %',font:{size:10}},ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}},
          plugins:{legend:{display:false}}
        }
      });
      compCharts.push(ch);
    }
  }
  renderStats();
}

function renderStats(){
  const body=document.getElementById('statsBody');
  let html='<table class="stats-table"><thead><tr><th>テイク</th><th>最大衝撃(G)</th><th>平均衝撃(G)</th><th>ピーク数</th><th>最大角速度</th><th>時間(s)</th></tr></thead><tbody>';
  for(const t of takes){
    const m=t.metrics;
    html+=`<tr><td style="color:${t.color};font-weight:700">${esc(t.name)}</td><td>${m.maxImpact.toFixed(2)}</td><td>${m.avgImpact.toFixed(2)}</td><td>${m.peakCount}</td><td>${m.maxGyro.toFixed(1)}</td><td>${m.duration.toFixed(1)}</td></tr>`;
  }
  html+='</tbody></table>';
  body.innerHTML=html;
}
function toggleStats(){
  const tog=document.getElementById('statsToggle');
  const body=document.getElementById('statsBody');
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  tog.classList.toggle('open',!open);
}

/* ===== Reset ===== */
function resetAll(){
  takes=[];
  fullLog=[];
  liveBuffer=[];
  recording=false;
  currentTake=null;
  clearInterval(timerInterval);
  document.getElementById('inName').value='';
  document.getElementById('inLoc').value='';
  document.getElementById('inMemo').value='';
  goTo('v-setup');
}

/* ===== Init ===== */
renderTakesList();
</script>
